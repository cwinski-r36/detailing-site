<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Noah's Website</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=Lato:wght@300;400;700&family=Belanosima:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navigation -->
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo-placeholder">[ Logo ]</a>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav-links">
        <a href="about.html">About</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>
  <script>
    const toggle = document.querySelector('.nav-toggle');
    const nav = document.querySelector('.nav-links');
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      nav.classList.toggle('open');
    });
  </script>

  <!-- Page Header -->
  <section class="page-hero">
    <div class="page-hero-content">
      <p class="hero-eyebrow">Get in Touch</p>
      <h1>Contact Us</h1>
    </div>
  </section>

  <!-- Contact Content -->
  <section class="section">
    <div class="contact-grid">

      <!-- Contact Form -->
      <div class="contact-form-wrap">
        <h2>Send a Message</h2>
        <form class="contact-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" />
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" placeholder="How can we help?"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
      </div>

      <!-- Contact Info -->
      <div class="contact-info">
        <h2>Contact Info</h2>
        <div class="info-block">
          <p class="info-label">Email</p>
          <p>noah.winski@gmail.com</p>
        </div>
        <div class="info-block">
          <p class="info-label">Phone</p>
          <p>303.482.5348</p>
        </div>
        <div class="info-block">
          <p class="info-label">Location</p>
          <p>Boulder, CO</p>
        </div>
      </div>

    </div>
  </section>

</body>
</html>
